  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>
    // DevTools / external bridge: anycms DevTools flips dark mode by setting
    // `data-theme="dark"|"light"` on <html> (the convention used by the ink/
    // folio/manual themes). dream instead drives `data-theme` reactively via
    // the Alpine `$store.darkMode` store (values: emerald/forest), so the
    // DevTools attribute would be clobbered. This observer translates the
    // external `dark`/`light` hint into a store toggle, letting DevTools (and
    // any tool using the platform convention) control dream's mode. Safe from
    // recursion: the store then sets emerald/forest, which are not dark/light,
    // so the observer does not re-fire.
    (function () {
      var html = document.documentElement;
      document.addEventListener('alpine:initialized', function () {
        apply();
        new MutationObserver(apply).observe(html, {
          attributes: true,
          attributeFilter: ['data-theme'],
        });
      });
      function apply() {
        var t = html.getAttribute('data-theme');
        if (t !== 'dark' && t !== 'light') return;
        if (!window.Alpine) return;
        var store = Alpine.store('darkMode');
        if (!store) return;
        var want = t === 'dark' ? 'y' : 'n';
        if (store.on !== want) store.toggle(want);
      }
    })();
  </script>
