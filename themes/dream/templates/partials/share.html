{# Social share buttons (X / Facebook / WhatsApp). `page.url` is the
   current post's relative URL; build share links against config.base_url. #}
{% set share_url = config.base_url ~ page.url if config.base_url else page.url %}
<div class="flex items-center gap-2">
  <a class="group inline-flex items-center p-2 rounded-full cursor-pointer hover:bg-primary"
    href="https://x.com/intent/post?text={{ page.title }}&url={{ share_url }}" target="_blank" rel="noopener noreferrer" title="分享到 X">
    <ion-icon class="group-hover:text-primary-content" name="logo-x"></ion-icon>
  </a>
  <a class="group inline-flex items-center p-2 rounded-full cursor-pointer hover:bg-primary"
    href="https://facebook.com/sharer/sharer.php?u={{ share_url }}" target="_blank" rel="noopener noreferrer" title="分享到 Facebook">
    <ion-icon class="group-hover:text-primary-content" name="logo-facebook"></ion-icon>
  </a>
  <a class="group inline-flex items-center p-2 rounded-full cursor-pointer hover:bg-primary"
    href="https://wa.me/?text={{ page.title }} {{ share_url }}" target="_blank" rel="noopener noreferrer" title="分享到 WhatsApp">
    <ion-icon class="group-hover:text-primary-content" name="logo-whatsapp"></ion-icon>
  </a>
</div>
