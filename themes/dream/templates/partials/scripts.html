{# Expose the daisyUI theme names to main.js (the darkMode store reads them). #}
<script>
  window.lightTheme = "{{ config.params.lightTheme | default('emerald') }}"
  window.darkTheme = "{{ config.params.darkTheme | default('forest') }}"
</script>

{# Masonry grid — only when not in zen mode. #}
{% if config.params.zenMode != 'true' %}
<script src="https://cdn.jsdelivr.net/npm/imagesloaded@5.0.0/imagesloaded.pkgd.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/masonry-layout@4.2.2/dist/masonry.pkgd.min.js" crossorigin="anonymous"></script>
<script src="/js/grid.js"></script>
{% endif %}

<script src="/js/main.js"></script>
